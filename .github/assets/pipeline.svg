<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="qaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#f8fafc" font-size="36" font-weight="700">RN Launch Harness</text>
  <text x="600" y="90" text-anchor="middle" fill="#94a3b8" font-size="16">React Native idea → App Store submission, automated</text>

  <!-- Command -->
  <rect x="350" y="115" width="500" height="42" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="370" y="143" fill="#10b981" font-family="monospace" font-size="18" font-weight="600">❯</text>
  <text x="395" y="143" fill="#e2e8f0" font-family="monospace" font-size="16">/rn-harness "coffee subscription tracker"</text>

  <!-- Phase 1: Research -->
  <g transform="translate(60, 200)">
    <rect width="240" height="70" rx="10" fill="url(#phaseGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">1. RESEARCH</text>
    <text x="20" y="52" fill="#e0e7ff" font-size="11">Top charts · Competitor analysis</text>
  </g>

  <!-- Arrow -->
  <path d="M 300 235 L 340 235" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 2: Plan -->
  <g transform="translate(340, 200)">
    <rect width="240" height="70" rx="10" fill="url(#phaseGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">2. PLAN</text>
    <text x="20" y="52" fill="#e0e7ff" font-size="11">PRD · FSD module map · API</text>
  </g>

  <path d="M 580 235 L 620 235" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 3: Design -->
  <g transform="translate(620, 200)">
    <rect width="240" height="70" rx="10" fill="url(#phaseGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">3. DESIGN SYSTEM</text>
    <text x="20" y="52" fill="#e0e7ff" font-size="11">NativeWind · Light / Dark</text>
  </g>

  <path d="M 860 235 L 900 235" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 4: Contract -->
  <g transform="translate(900, 200)">
    <rect width="240" height="70" rx="10" fill="url(#phaseGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">4. CONTRACT</text>
    <text x="20" y="52" fill="#e0e7ff" font-size="11">Generator ↔ Evaluator agree</text>
  </g>

  <!-- Vertical arrow down -->
  <path d="M 1020 270 L 1020 310" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 5: Build -->
  <g transform="translate(780, 320)">
    <rect width="360" height="90" rx="10" fill="url(#qaGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">5. BUILD (3 sub-phases)</text>
    <text x="20" y="50" fill="#d1fae5" font-size="11">5a. Scaffold FSD modules + types</text>
    <text x="20" y="66" fill="#d1fae5" font-size="11">5b. API integration (Axios + TanStack Query)</text>
    <text x="20" y="82" fill="#d1fae5" font-size="11">5c. Expo Router screens (NativeWind)</text>
  </g>

  <path d="M 780 365 L 740 365" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 6: QA -->
  <g transform="translate(500, 320)">
    <rect width="240" height="90" rx="10" fill="url(#qaGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">6. QA</text>
    <text x="20" y="50" fill="#d1fae5" font-size="11">typecheck · lint · tests</text>
    <text x="20" y="66" fill="#d1fae5" font-size="11">FSD rules · no stubs</text>
    <text x="20" y="82" fill="#d1fae5" font-size="11">--strict: 6 parallel agents</text>
  </g>

  <path d="M 500 365 L 460 365" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 7: AdMob -->
  <g transform="translate(220, 320)">
    <rect width="240" height="90" rx="10" fill="url(#qaGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">7. ADMOB</text>
    <text x="20" y="50" fill="#d1fae5" font-size="11">Smart banner placement</text>
    <text x="20" y="66" fill="#d1fae5" font-size="11">Interstitial + rewarded</text>
    <text x="20" y="82" fill="#d1fae5" font-size="11">ATT permission (2s delay)</text>
  </g>

  <path d="M 340 410 L 340 450" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 8: EAS Build -->
  <g transform="translate(60, 460)">
    <rect width="240" height="80" rx="10" fill="url(#shipGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">8. EAS BUILD</text>
    <text x="20" y="50" fill="#fef3c7" font-size="11">iOS (.ipa) + Android (.aab)</text>
    <text x="20" y="66" fill="#fef3c7" font-size="11">EAS Update (OTA) configured</text>
  </g>

  <path d="M 300 500 L 340 500" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 9: Screenshot -->
  <g transform="translate(340, 460)">
    <rect width="240" height="80" rx="10" fill="url(#shipGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">9. SCREENSHOTS</text>
    <text x="20" y="50" fill="#fef3c7" font-size="11">Maestro on real simulator</text>
    <text x="20" y="66" fill="#fef3c7" font-size="11">Ads auto-hidden for capture</text>
  </g>

  <path d="M 580 500 L 620 500" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 10: Submit -->
  <g transform="translate(620, 460)">
    <rect width="240" height="80" rx="10" fill="url(#shipGrad)" opacity="0.95"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="700">10. SUBMIT</text>
    <text x="20" y="50" fill="#fef3c7" font-size="11">ASC API (iOS fully auto)</text>
    <text x="20" y="66" fill="#fef3c7" font-size="11">Google Play API (Android)</text>
  </g>

  <path d="M 860 500 L 900 500" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Done -->
  <g transform="translate(900, 460)">
    <rect width="240" height="80" rx="10" fill="#065f46" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <text x="120" y="35" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">✓ UNDER REVIEW</text>
    <text x="120" y="58" text-anchor="middle" fill="#d1fae5" font-size="11">Both stores · awaiting approval</text>
  </g>

  <!-- Stats / Principles -->
  <g transform="translate(60, 600)">
    <text x="0" y="0" fill="#f8fafc" font-size="18" font-weight="700">Based on Anthropic's Harness Design</text>
    <text x="0" y="30" fill="#94a3b8" font-size="13">• Generator/Evaluator separation (no self-assessment bias)</text>
    <text x="0" y="52" fill="#94a3b8" font-size="13">• File-based handoff between agents</text>
    <text x="0" y="74" fill="#94a3b8" font-size="13">• Hard thresholds: 0 TS errors · 0 any · 0 stubs · 0 FSD violations</text>
    <text x="0" y="96" fill="#94a3b8" font-size="13">• Pause &amp; resume on manual steps (Play Console, ASC keys)</text>
  </g>

  <!-- Stack -->
  <g transform="translate(680, 600)">
    <text x="0" y="0" fill="#f8fafc" font-size="18" font-weight="700">Generated Stack</text>
    <text x="0" y="30" fill="#94a3b8" font-size="13">React Native · Expo · TypeScript strict</text>
    <text x="0" y="52" fill="#94a3b8" font-size="13">NativeWind · Zustand · TanStack Query</text>
    <text x="0" y="74" fill="#94a3b8" font-size="13">Expo Router · FlashList · AdMob</text>
    <text x="0" y="96" fill="#94a3b8" font-size="13">Feature-Sliced Design architecture</text>
  </g>

  <!-- Footer -->
  <text x="600" y="770" text-anchor="middle" fill="#475569" font-size="12">github.com/tjdrhs90/rn-launch-harness</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
